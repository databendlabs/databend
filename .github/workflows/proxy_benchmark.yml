name: Proxy Benchmark

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
      - backport/*
    paths:
      - ".github/workflows/proxy_benchmark.yml"
      - "scripts/benchmark/proxy_table_routing_bench.py"
      - "scripts/ci/ci-run-proxy-routing-benchmark.sh"
      - "src/query/catalog/src/table.rs"
      - "src/query/settings/src/**"
      - "src/query/storages/basic/src/proxy_table.rs"
      - "src/query/storages/fuse/src/**"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

jobs:
  build:
    runs-on:
      - self-hosted
      - X64
      - Linux
      - 16c
      - aws
    env:
      BUILD_PROFILE: debug
      RUNNER_PROVIDER: aws
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/build_linux
        timeout-minutes: 60
        with:
          sha: ${{ github.sha }}
          target: x86_64-unknown-linux-gnu
          artifacts: meta,query
          trim_debug: "false"

  proxy-routing-benchmark:
    needs: build
    runs-on:
      - self-hosted
      - X64
      - Linux
      - 2c
      - aws
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: statistics
            proxy_routing_model: statistics
          - name: prefix
            proxy_routing_model: prefix
    name: PROXY routing benchmark (${{ matrix.name }})
    env:
      BUILD_PROFILE: debug
      RUNNER_PROVIDER: aws
      BINARY_DIR: target/debug
      ROWS: "50000"
      PROXY_ROUTING_MODEL: ${{ matrix.proxy_routing_model }}
      PAYLOAD_BYTES: "16"
      WARMUP_ROUNDS: "0"
      MEASURE_ROUNDS: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/artifact_download
        with:
          sha: ${{ github.sha }}
          target: x86_64-unknown-linux-gnu
          artifacts: meta,query

      - name: Run PROXY routing benchmark
        timeout-minutes: 20
        run: bash scripts/ci/ci-run-proxy-routing-benchmark.sh
