name: "Setup BendSQL"
description: "Setup BendSQL for CI"
runs:
  using: "composite"
  steps:
    - name: Install for Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        if command -v bendsql >/dev/null 2>&1; then
          bendsql --version
          exit 0
        fi

        export BENDSQL_VERSION="v0.33.6"
        curl -fsSL https://repo.databend.com/install/bendsql.sh | bash -s -- -y --prefix /usr/local
        bendsql --version

    - name: Install for macOS
      if: runner.os == 'macOS'
      shell: bash
      run: |
        if command -v bendsql >/dev/null 2>&1; then
          bendsql --version
          exit 0
        fi

        brew install databendcloud/homebrew-tap/bendsql
        bendsql --version
