name: "Build Linux"
description: "Build with profile"
inputs:
  sha:
    description: "Git commit sha"
    required: true
  target:
    description: ""
    required: true
  upload:
    description: "Upload artifact"
    required: false
    default: "true"
  artifacts:
    description: "Artifacts to build"
    required: false
    default: "sqllogictests,meta,query"
  features:
    description: "Features to build"
    required: false
    default: "default"
  no_default_features:
    description: "Build with --no-default-features"
    required: false
    default: "false"
  category:
    description: "Category to upload"
    required: false
    default: "default"
  trim_debug:
    description: "Trim debug info"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Setup Build Tool
      uses: ./.github/actions/setup_build_tool
      with:
        target: ${{ inputs.target }}
        bypass_env_vars: RUSTFLAGS,RUST_LOG,DATABEND_RELEASE_VERSION,DATABEND_ENTERPRISE_LICENSE_PUBLIC_KEY,DATABEND_ENTERPRISE_LICENSE_EMBEDDED,DATABEND_TELEMETRY_ENDPOINT,DATABEND_TELEMETRY_API_KEY,DATABEND_TELEMETRY_SOURCE,CARGO_PROFILE_RELEASE_OPT_LEVEL

    - name: Cross setup
      if: startsWith(inputs.target, 'aarch64-')
      shell: bash
      run: |
        echo "JEMALLOC_SYS_WITH_LG_PAGE=16" >> $GITHUB_ENV

    - name: Set Build Flags
      shell: bash
      run: |
        case ${{ inputs.target }} in
          x86_64-unknown-linux-gnu)
            flags="-C target-feature=+sse4.2"
            ;;
          x86_64-unknown-linux-musl)
            flags="-C target-feature=+sse4.2"
            ;;
          aarch64-unknown-linux-gnu)
            flags=""
            ;;
          aarch64-unknown-linux-musl)
            flags=""
            ;;
          *)
            flags=""
            ;;
        esac
        if [[ ! -z "${flags}" ]]; then
          echo "RUSTFLAGS=${flags}" >> $GITHUB_ENV
        fi
        target=${{ inputs.target }}
        echo "BUILD_ARCH=${target/-unknown-linux-*}" >> $GITHUB_ENV

    - name: Build Release
      shell: bash
      run: |
        artifacts="${{ inputs.artifacts }}"
        if [[ "${artifacts}" == "all" ]]; then
          artifacts="meta,metactl,metabench,query,sqllogictests,bendsave"
        fi

        package_for_artifact() {
          case "$1" in
            query) echo "databend-binaries" ;;
            meta|metactl|metabench|metaverifier) echo "databend-meta-binaries" ;;
            sqllogictests) echo "databend-sqllogictests" ;;
            sqlsmith) echo "databend-sqlsmith" ;;
            bendsave) echo "databend-bendsave" ;;
            *)
              echo "Unknown artifact: $1" >&2
              return 1
              ;;
          esac
        }

        contains_feature() {
          local haystack=",$1,"
          local needle="$2"
          [[ "${haystack}" == *",${needle},"* ]]
        }

        for artifact in ${artifacts//,/ }; do
          binary="databend-$artifact"
          package="$(package_for_artifact "$artifact")"
          cmd=(
            cargo build
            --target "${{ inputs.target }}"
            --profile "${{ env.BUILD_PROFILE }}"
            -p "$package"
            --bin "$binary"
          )

          if [[ "$artifact" == "query" ]]; then
            if [[ "${{ inputs.no_default_features }}" == "true" ]]; then
              cmd+=(--no-default-features)
            fi
            if [[ -n "${{ inputs.features }}" && "${{ inputs.features }}" != "default" ]]; then
              cmd+=(--features "${{ inputs.features }}")
            fi
          elif [[ "$package" == "databend-meta-binaries" ]]; then
            meta_features=()
            if contains_feature "${{ inputs.features }}" "jemalloc"; then
              meta_features+=("jemalloc")
            fi
            if contains_feature "${{ inputs.features }}" "memory-profiling"; then
              meta_features+=("memory-profiling")
            fi
            if (( ${#meta_features[@]} > 0 )); then
              cmd+=(--features "$(IFS=,; echo "${meta_features[*]}")")
            fi
          fi

          echo "==> building ${binary} from ${package} ..."
          printf '>>>'
          printf ' %q' "${cmd[@]}"
          printf '\n'
          "${cmd[@]}"
          ls -lh "./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/${binary}"
        done

    - name: Check Binary Info
      shell: bash
      run: |
        grep ' Compiled in ' target/sccache.log || true
        if [[ -f ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query ]]; then
          readelf -p .comment ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query || true
          ldd ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query || true
        fi

    - name: Spilt Binary Symbols
      if: inputs.trim_debug == 'true'
      shell: bash
      run: |
        if [[ -f ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query ]]; then
          objcopy --only-keep-debug ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query.debug
          chmod 0644 ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query.debug
          strip --strip-debug --remove-section=.comment --remove-section=.note ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-query
          pushd ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }} && objcopy --add-gnu-debuglink databend-query.debug databend-query && popd
        fi

    # - name: Compress Binaries with UPX
    #   if: env.BUILD_PROFILE == 'debug'
    #   uses: crazy-max/ghaction-upx@v2
    #   with:
    #     files: ./target/${{ inputs.target }}/${{ env.BUILD_PROFILE }}/databend-*

    - name: Upload artifact
      if: inputs.upload == 'true'
      uses: ./.github/actions/artifact_upload
      with:
        sha: ${{ inputs.sha }}
        target: ${{ inputs.target }}
        category: ${{ inputs.category }}
