# Usage:
# databend-query -c databend_query_config_spec.toml

[query]
max_active_sessions = 256
shutdown_wait_timeout_ms = 5000

# For flight rpc.
flight_api_address = "0.0.0.0:9095"

# Databend Query http address.
# For admin RESET API.
admin_api_address = "0.0.0.0:8085"

# Databend Query metrics RESET API.
metric_api_address = "0.0.0.0:7075"

# Databend Query MySQL Handler.
mysql_handler_host = "0.0.0.0"
mysql_handler_port = 3311

# Databend Query HTTP Handler.
http_handler_host = "0.0.0.0"
http_handler_port = 8005

# Databend Query FlightSQL Handler.
flight_sql_handler_host = "0.0.0.0"
flight_sql_handler_port = 8905

tenant_id = "test_tenant"
cluster_id = "test_cluster"
warehouse_id = "test_warehouse"

table_engine_memory_enabled = true
default_storage_format = 'parquet'
default_compression = 'zstd'

[[query.users]]
name = "root"
auth_type = "no_password"

[[query.users]]
name = "default"
auth_type = "no_password"

[[query.udfs]]
name = "ping"
definition = "CREATE FUNCTION ping(STRING) RETURNS STRING LANGUAGE python HANDLER = 'ping' ADDRESS = 'http://0.0.0.0:8815'"

[log]

[log.file]
level = "DEBUG"
format = "text"
limit = 12
dir = "./.databend/logs_5"

[log.structlog]
on = true
dir = "./.databend/structlog_5"

[meta]
endpoints = ["0.0.0.0:9191"]
username = "root"
password = "root"
client_timeout_in_second = 60
auto_sync_interval = 60

[storage]
type = "fs"

[storage.fs]
data_path = "./.databend/stateless_test_data"

[cache]
data_cache_storage = "none"

[cache.disk]
path = "./.databend/_cache"
max_bytes = 21474836480
