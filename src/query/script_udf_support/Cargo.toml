[package]
name = "databend-query-script-udf-support"
description = "Script UDF support integrations for Databend query"
version = { workspace = true }
authors = { workspace = true }
license = { workspace = true }
publish = { workspace = true }
edition = { workspace = true }

[features]
default = []
script-udf = ["dep:arrow-udf-runtime"]
python-udf = ["script-udf", "arrow-udf-runtime/python"]

[dependencies]
anyhow = { workspace = true }
arrow-array = { workspace = true }
arrow-ipc = { workspace = true }
arrow-schema = { workspace = true }
arrow-select = { workspace = true }
arrow-udf-runtime = { workspace = true, optional = true }
databend-common-base = { workspace = true }
databend-common-cache = { workspace = true }
databend-common-exception = { workspace = true }
databend-common-expression = { workspace = true }
databend-common-functions = { workspace = true }
databend-common-meta-app = { workspace = true }
databend-common-pipeline-transforms = { workspace = true }
databend-common-sql = { workspace = true }
databend-common-storage = { workspace = true }
futures = { workspace = true }
log = { workspace = true }
parking_lot = { workspace = true }
tokio = { workspace = true }
toml = { workspace = true }
uuid = { workspace = true }
walkdir = { workspace = true }
zip = { workspace = true }

[lints]
workspace = true
