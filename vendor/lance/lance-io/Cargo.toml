[package]
edition = "2021"
rust-version = "1.82.0"
name = "lance-io"
version = "1.0.4"
authors = ["Lance Devs <dev@lance.org>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "I/O utilities for Lance"
readme = "README.md"
keywords = [
    "data-format",
    "data-science",
    "machine-learning",
    "apache-arrow",
    "data-analytics",
]
categories = [
    "database-implementations",
    "data-structures",
    "development-tools",
    "science",
]
license = "Apache-2.0"
repository = "https://github.com/lance-format/lance"

[features]
aws = [
    "object_store/aws",
    "dep:aws-config",
    "dep:aws-credential-types",
    "dep:opendal",
    "opendal/services-s3",
    "dep:object_store_opendal",
]
azure = [
    "object_store/azure",
    "dep:opendal",
    "opendal/services-azblob",
    "dep:object_store_opendal",
]
default = [
    "aws",
    "azure",
    "gcp",
]
gcp = [
    "object_store/gcp",
    "dep:opendal",
    "opendal/services-gcs",
    "dep:object_store_opendal",
]
gcs-test = []
huggingface = [
    "dep:opendal",
    "opendal/services-huggingface",
    "dep:object_store_opendal",
]
oss = [
    "dep:opendal",
    "opendal/services-oss",
    "dep:object_store_opendal",
]
test-util = []

[lib]
name = "lance_io"
path = "src/lib.rs"

[[test]]
name = "gcs_integration"
path = "tests/gcs_integration.rs"

[[bench]]
name = "scheduler"
path = "benches/scheduler.rs"
