[package]
edition = "2024"
homepage = "https://rust.iceberg.apache.org/"
name = "iceberg-catalog-s3tables"
rust-version = "1.88"
version = "0.8.0"
readme = "README.md"

categories = ["database"]
description = "Apache Iceberg Rust S3Tables Catalog"
keywords = ["iceberg", "sql", "catalog"]
license = "Apache-2.0"
repository = "https://github.com/apache/iceberg-rust"

[dependencies]
anyhow = "1.0.72"
async-trait = "0.1.89"
aws-config = "1.8.7"
aws-sdk-s3tables = "1.28.0"
iceberg = { version = "0.8.0", path = "../../iceberg" }


[dev-dependencies]
iceberg_test_utils = { path = "../../test_utils", features = ["tests"] }
itertools = "0.13"
tokio = { version = "1.47", default-features = false }
