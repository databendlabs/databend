[package]
edition = "2024"
homepage = "https://rust.iceberg.apache.org/"
name = "iceberg"
rust-version = "1.88"
version = "0.8.0"

categories = ["database"]
description = "Apache Iceberg Rust implementation"
keywords = ["iceberg"]
license = "Apache-2.0"
repository = "https://github.com/apache/iceberg-rust"

[features]
default = ["storage-memory", "storage-fs", "storage-s3"]
storage-all = ["storage-memory", "storage-fs", "storage-s3", "storage-gcs"]

storage-azdls = ["opendal/services-azdls"]
storage-fs = ["opendal/services-fs"]
storage-gcs = ["opendal/services-gcs"]
storage-memory = ["opendal/services-memory"]
storage-oss = ["opendal/services-oss"]
storage-s3 = ["opendal/services-s3", "reqsign"]


[dependencies]
anyhow = "1.0.72"
apache-avro = { version = "0.21", features = ["zstandard"] }
array-init = "2"
arrow-arith = "58.1.0"
arrow-array = "58.1.0"
arrow-buffer = "58.1.0"
arrow-cast = "58.1.0"
arrow-ord = "58.1.0"
arrow-schema = "58.1.0"
arrow-select = "58.1.0"
arrow-string = "58.1.0"
as-any = "0.3.2"
async-trait = "0.1.89"
backon = "1.5.1"
base64 = "0.22.1"
bimap = "0.6"
bytes = "1.10"
chrono = "0.4.41"
derive_builder = "0.20"
expect-test = "1"
flate2 = "1.1.5"
fnv = "1.0.7"
futures = "0.3"
itertools = "0.13"
moka = { version = "0.12.10", features = ["future"] }
murmur3 = "0.5.2"
num-bigint = "0.4.6"
once_cell = "1.20"
opendal = "0.54.1"
ordered-float = "4"
parquet = { version = "58.1.0", features = ["async"] }
rand = "0.8.5"
reqsign = { version = "0.16.3", optional = true, default-features = false }
reqwest = { version = "0.12.12", default-features = false, features = ["json"] }
roaring = "0.11"
rust_decimal = "1.37.2"
serde = { version = "1.0.219", features = ["rc"] }
serde_bytes = "0.11.17"
serde_derive = "1.0.219"
serde_json = "1.0.142"
serde_repr = "0.1.16"
serde_with = "3.4"
strum = { version = "0.27.2", features = ["derive"] }
tokio = { version = "1.47", default-features = false, features = ["sync"] }
typed-builder = "0.20"
url = "2.5.7"
uuid = { version = "1.18", features = ["v7"] }
zstd = "0.13.3"

[dev-dependencies]
ctor = "0.2.8"
expect-test = "1"
iceberg_test_utils = { path = "../test_utils", features = ["tests"] }
mockall = "0.13.1"
pretty_assertions = "1.4"
rand = "0.8.5"
regex = "1.11.3"
tempfile = "3.18"
minijinja = "2.12.0"

[package.metadata.cargo-machete]
# These dependencies are added to ensure minimal dependency version
ignored = ["tap"]
